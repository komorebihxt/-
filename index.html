    /* 3. 暴力强制生效逻辑 */
    /* 我们给所有标题和带有特定类名的元素强制指定快乐体 */

      font-family: 'ZCOOL KuaiLe', 'ZCOOL_KuaiLe', cursive !important;

    body {
      background-color: #f5f2ed;
      /* 这里的字体作为保底，防止出现诡异楷体 */
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
